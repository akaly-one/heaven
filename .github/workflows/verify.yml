name: Verify Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Env vars check
        run: node scripts/check-env.mjs
      - name: Build
        run: npm run build
        env:
          # Env vars minimales requises au build pour ne pas crasher — remplies
          # en vrai via les secrets du workflow si un build réel est voulu.
          # Ici le build doit tolérer les valeurs placeholder (voir lazy init).
          NODE_ENV: production
