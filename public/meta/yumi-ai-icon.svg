<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E84393"/>
      <stop offset="50%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#glow)"/>

  <!-- Letter Y — elegant serif, white -->
  <text x="512" y="712"
        text-anchor="middle"
        font-family="'Playfair Display', 'Didot', 'Bodoni MT', Georgia, serif"
        font-size="720"
        font-weight="500"
        fill="#ffffff"
        letter-spacing="-20">Y</text>

  <!-- Subtle inner border -->
  <rect x="12" y="12" width="1000" height="1000" rx="216"
        fill="none"
        stroke="rgba(255,255,255,0.12)"
        stroke-width="2"/>
</svg>
